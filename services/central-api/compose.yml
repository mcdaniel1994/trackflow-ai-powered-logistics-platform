services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: "${POSTGRES_DB:?Set POSTGRES_DB in the untracked .env file}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in the untracked .env file}"
      POSTGRES_USER: "${POSTGRES_USER:?Set POSTGRES_USER in the untracked .env file}"
    ports:
      - "${CENTRAL_API_POSTGRES_PORT:-55432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 2s
      timeout: 3s
      retries: 20
    # A tmpfs makes this database explicitly disposable between Compose teardown cycles.
    tmpfs:
      - /var/lib/postgresql/data
