name: Deploy production

on:
  workflow_call:
    inputs:
      image_tag:
        description: Immutable sha-<40 lowercase hex> image tag
        required: true
        type: string
      deployment_mode:
        description: Release runs migrations; image-rollback never downgrades the database
        required: false
        default: release
        type: string
  workflow_dispatch:
    inputs:
      image_tag:
        description: Immutable sha-<40 lowercase hex> image tag
        required: true
        type: string
      deployment_mode:
        description: Choose image-rollback only for a known compatible prior SHA
        required: true
        default: release
        type: choice
        options: [release, image-rollback]

permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Migrate, deploy, and verify immutable SHA
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment:
      name: production
    env:
      IMAGE_TAG: ${{ inputs.image_tag }}
      DEPLOYMENT_MODE: ${{ inputs.deployment_mode || 'release' }}
      COOLIFY_BASE_URL: ${{ secrets.COOLIFY_BASE_URL }}
      COOLIFY_APPLICATION_UUID: ${{ secrets.COOLIFY_APPLICATION_UUID }}
      COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
      COOLIFY_WEBHOOK: ${{ secrets.COOLIFY_WEBHOOK }}
      MIGRATION_DATABASE_URL: ${{ secrets.MIGRATION_DATABASE_URL }}
      BACKOFFICE_BASE_URL: https://backoffice.forgehub.cloud

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate and mask release configuration
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! "$IMAGE_TAG" =~ ^sha-[0-9a-f]{40}$ ]]; then
            echo "image_tag must be an immutable full SHA tag." >&2
            exit 1
          fi
          if [[ "$DEPLOYMENT_MODE" != "release" && "$DEPLOYMENT_MODE" != "image-rollback" ]]; then
            echo "deployment_mode must be release or image-rollback." >&2
            exit 1
          fi
          : "${COOLIFY_BASE_URL:?COOLIFY_BASE_URL is required}"
          : "${COOLIFY_APPLICATION_UUID:?COOLIFY_APPLICATION_UUID is required}"
          : "${COOLIFY_TOKEN:?COOLIFY_TOKEN is required}"
          : "${COOLIFY_WEBHOOK:?COOLIFY_WEBHOOK is required}"
          if [[ "$DEPLOYMENT_MODE" == "release" ]]; then
            : "${MIGRATION_DATABASE_URL:?MIGRATION_DATABASE_URL is required for a release}"
          fi
          for value in "$COOLIFY_BASE_URL" "$COOLIFY_APPLICATION_UUID" "$COOLIFY_TOKEN" "$COOLIFY_WEBHOOK" "$MIGRATION_DATABASE_URL"; do
            if [[ -n "$value" ]]; then echo "::add-mask::$value"; fi
          done
          echo "ROLLBACK_RESULT=not-required" >> "$GITHUB_ENV"
          echo "MIGRATION_BEFORE=not-run" >> "$GITHUB_ENV"
          echo "MIGRATION_AFTER=not-run" >> "$GITHUB_ENV"

      - name: Confirm all immutable image manifests exist
        shell: bash
        run: |
          set -euo pipefail
          for image in \
            ghcr.io/mcdaniel1994/trackflow-identity \
            ghcr.io/mcdaniel1994/trackflow-central-api \
            ghcr.io/mcdaniel1994/trackflow-backoffice
          do
            docker buildx imagetools inspect "$image:$IMAGE_TAG" > /dev/null
          done

      - name: Run and verify production migrations
        if: env.DEPLOYMENT_MODE == 'release'
        shell: bash
        run: |
          set -euo pipefail
          output="$RUNNER_TEMP/production-migration.log"
          if ! docker run --rm --pull=always --read-only --tmpfs /tmp \
            --env APP_ENV=production \
            --env DATABASE_URL="$MIGRATION_DATABASE_URL" \
            --env MIGRATION_DATABASE_URL="$MIGRATION_DATABASE_URL" \
            "ghcr.io/mcdaniel1994/trackflow-central-api:$IMAGE_TAG" \
            .venv/bin/central-api-migrate > "$output" 2>&1
          then
            cat "$output"
            exit 1
          fi
          cat "$output"
          result="$(grep '^production_migration_complete ' "$output" | tail -1)"
          before="$(sed -n 's/.*before_revision=\([^ ]*\).*/\1/p' <<< "$result")"
          after="$(sed -n 's/.*after_revision=\([^ ]*\).*/\1/p' <<< "$result")"
          if [[ -z "$before" || -z "$after" || "$result" != *"runtime_grants=verified"* ]]; then
            echo "Migration verification output was incomplete." >&2
            exit 1
          fi
          echo "MIGRATION_BEFORE=$before" >> "$GITHUB_ENV"
          echo "MIGRATION_AFTER=$after" >> "$GITHUB_ENV"

      - name: Deploy immutable SHA through Coolify
        id: coolify_deploy
        continue-on-error: true
        shell: bash
        env:
          TARGET_IMAGE_TAG: ${{ env.IMAGE_TAG }}
          CAPTURE_PREVIOUS_IMAGE_TAG: "true"
        run: python scripts/release/coolify_release.py

      - name: Poll application health and unauthenticated protection
        id: release_verification
        if: steps.coolify_deploy.outcome == 'success'
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          ready=false
          for attempt in {1..30}; do
            if curl --silent --show-error --fail --max-time 10 \
              "$BACKOFFICE_BASE_URL/api/health" > /dev/null
            then
              ready=true
              break
            fi
            if [[ "$attempt" -lt 30 ]]; then sleep 10; fi
          done
          if [[ "$ready" != "true" ]]; then
            echo "Back Office readiness did not recover after deployment." >&2
            exit 1
          fi
          status="$(curl --silent --show-error --output /dev/null --write-out '%{http_code}' \
            --max-time 10 "$BACKOFFICE_BASE_URL/api/reporting/pipeline-runs/latest")"
          if [[ "$status" != "401" ]]; then
            echo "Expected unauthenticated reporting protection; received HTTP $status." >&2
            exit 1
          fi

      - name: Restore previous image after deployment or health failure
        id: automatic_rollback
        if: steps.coolify_deploy.outcome == 'failure' || steps.release_verification.outcome == 'failure'
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${PREVIOUS_IMAGE_TAG:-}" ]]; then
            echo "No image mutation occurred before the deployment failure."
            echo "ROLLBACK_RESULT=not-needed" >> "$GITHUB_ENV"
            exit 0
          fi
          if [[ ! "$PREVIOUS_IMAGE_TAG" =~ ^sha-[0-9a-f]{40}$ ]]; then
            echo "The previous image tag is not rollback-safe." >&2
            exit 1
          fi
          TARGET_IMAGE_TAG="$PREVIOUS_IMAGE_TAG" \
          CAPTURE_PREVIOUS_IMAGE_TAG=false \
            python scripts/release/coolify_release.py
          echo "ROLLBACK_RESULT=succeeded" >> "$GITHUB_ENV"

      - name: Fail an unsuccessful release
        if: steps.coolify_deploy.outcome == 'failure' || steps.release_verification.outcome == 'failure'
        shell: bash
        run: |
          if [[ "${{ steps.automatic_rollback.outcome }}" == "failure" ]]; then
            echo "Release verification failed and automatic image rollback also failed." >&2
          else
            echo "Release verification failed; automatic image rollback result: ${ROLLBACK_RESULT}." >&2
          fi
          exit 1

      - name: Write deployment summary
        if: always()
        shell: bash
        env:
          JOB_STATUS: ${{ job.status }}
        run: |
          {
            echo "Deployed SHA: \`${IMAGE_TAG#sha-}\`"
            echo
            echo "Mode: \`$DEPLOYMENT_MODE\`"
            echo
            echo "Migration: \`$MIGRATION_BEFORE -> $MIGRATION_AFTER\`"
            echo
            echo "Image rollback: \`$ROLLBACK_RESULT\`"
            echo
            echo "Job status: \`$JOB_STATUS\`"
          } >> "$GITHUB_STEP_SUMMARY"
