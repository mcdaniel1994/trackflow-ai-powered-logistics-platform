name: Publish container images

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/container-images.yml"
      - ".github/workflows/deploy-production.yml"
      - ".github/workflows/release-checks.yml"
      - "docker/**"
      - "packages/shared/**"
      - "packages/trackflow_auth/**"
      - "packages/trackflow_incidents/**"
      - "services/central-api/**"
      - "services/identity/**"
      - "uis/backoffice/**"
      - "package.json"
      - "package-lock.json"
  pull_request:
    paths:
      - ".github/workflows/container-images.yml"
      - ".github/workflows/deploy-production.yml"
      - ".github/workflows/release-checks.yml"
      - "docker/**"
      - "packages/shared/**"
      - "packages/trackflow_auth/**"
      - "packages/trackflow_incidents/**"
      - "services/central-api/**"
      - "services/identity/**"
      - "uis/backoffice/**"
      - "package.json"
      - "package-lock.json"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  checks:
    name: Release checks
    uses: ./.github/workflows/release-checks.yml
    concurrency:
      group: container-image-checks-${{ github.ref }}
      cancel-in-progress: true

  publish:
    name: Publish ${{ matrix.name }}
    needs: checks
    runs-on: ubuntu-latest
    concurrency:
      group: container-image-${{ matrix.name }}-${{ github.ref }}
      cancel-in-progress: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: identity
            image: ghcr.io/mcdaniel1994/trackflow-identity
            dockerfile: docker/identity.Dockerfile
          - name: central-api
            image: ghcr.io/mcdaniel1994/trackflow-central-api
            dockerfile: docker/central-api.Dockerfile
          - name: backoffice
            image: ghcr.io/mcdaniel1994/trackflow-backoffice
            dockerfile: docker/backoffice.Dockerfile

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Sign in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: metadata
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.image }}
          tags: |
            type=sha,prefix=sha-,format=long
            type=raw,value=main,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and publish image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}

  deploy:
    name: Deploy production
    needs: publish
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    uses: ./.github/workflows/deploy-production.yml
    with:
      image_tag: sha-${{ github.sha }}
    secrets: inherit
