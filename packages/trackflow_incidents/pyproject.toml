[project]
name = "trackflow-incidents"
version = "0.1.0"
description = "Shared TrackFlow incident contracts and legacy CSV validation."
requires-python = ">=3.11"

[project.optional-dependencies]
dev = [
  "build>=1.2.2",
  "mypy>=1.16.0",
  "pytest>=8.4.0",
  "ruff>=0.12.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["trackflow_incidents"]

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.ruff]
target-version = "py311"
line-length = 120

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM", "RUF"]

[tool.mypy]
python_version = "3.11"
strict = true

