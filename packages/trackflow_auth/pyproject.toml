[project]
name = "trackflow-auth"
version = "0.1.0"
description = "Shared TrackFlow authentication verification helpers for Python services."
requires-python = ">=3.11"
dependencies = [
  "fastapi>=0.115.0",
  "python-jose[cryptography]>=3.3.0",
  "pydantic>=2.8.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["trackflow_auth"]
