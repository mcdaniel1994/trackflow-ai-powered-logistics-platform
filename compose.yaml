name: trackflow-local
services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-trackflow_inventory}
      POSTGRES_USER: ${POSTGRES_USER:-trackflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-trackflow_local_only}
    ports: ["55432:5432"]
    tmpfs: ["/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 3s
      timeout: 3s
      retries: 20

  prefect-postgres:
    image: postgres:16@sha256:17e67d7b9890c99b055ba1e0d5c5be4ec27c9d3a72bda32db24a5e5d8a85af0c
    environment:
      POSTGRES_DB: prefect
      POSTGRES_USER: prefect
      POSTGRES_PASSWORD: ${PREFECT_DB_PASSWORD:-prefect_local_only}
    volumes:
      - prefect-db:/var/lib/postgresql/data
      - ./docker/prefect-postgres-init.sql:/docker-entrypoint-initdb.d/10-pg-trgm.sql:ro
    read_only: true
    tmpfs: ["/tmp", "/var/run/postgresql"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prefect -d prefect && psql -U prefect -d prefect -tAc \"SELECT 1 FROM pg_extension WHERE extname = 'pg_trgm'\" | grep -qx 1"]
      interval: 5s
      timeout: 5s
      retries: 30

  prefect-server:
    image: ${PREFECT_SERVER_IMAGE:-prefecthq/prefect:3.7.8-python3.11@sha256:d4d142f1426ed0e8d7f48b3cc730f7b0469dcbcaf720959bb678f4cec3e5c3cc}
    environment:
      PREFECT_API_DATABASE_CONNECTION_URL: postgresql+asyncpg://prefect:${PREFECT_DB_PASSWORD:-prefect_local_only}@prefect-postgres:5432/prefect
      PREFECT_SERVER_ANALYTICS_ENABLED: "false"
      PREFECT_CLOUD_ENABLE_ORCHESTRATION_TELEMETRY: "false"
      PREFECT_TELEMETRY_ENABLE_RESOURCE_METRICS: "false"
      PREFECT_HOME: /tmp/prefect
      DO_NOT_TRACK: "1"
    depends_on:
      prefect-postgres: {condition: service_healthy}
    read_only: true
    tmpfs: ["/tmp"]
    command: ["prefect", "server", "start", "--host", "0.0.0.0", "--port", "4200"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:4200/api/health', timeout=5).read()"]
      interval: 5s
      timeout: 6s
      retries: 60
    deploy:
      resources:
        limits: {cpus: "0.50", memory: 512M}

  # Release guard: Prefect must have created its state tables in PostgreSQL.
  prefect-postgres-guard:
    image: postgres:16@sha256:17e67d7b9890c99b055ba1e0d5c5be4ec27c9d3a72bda32db24a5e5d8a85af0c
    profiles: ["verification"]
    environment:
      PGPASSWORD: ${PREFECT_DB_PASSWORD:-prefect_local_only}
    depends_on:
      prefect-server: {condition: service_healthy}
    read_only: true
    tmpfs: ["/tmp"]
    command:
      [
        "/bin/sh",
        "-ec",
        "test \"$(psql -h prefect-postgres -U prefect -d prefect -tAc \"SELECT count(*) FROM pg_tables WHERE schemaname='public' AND tablename='flow_run'\")\" = 1 && test \"$(psql -h prefect-postgres -U prefect -d prefect -tAc \"SELECT count(*) FROM pg_extension WHERE extname='pg_trgm'\")\" = 1",
      ]

  identity:
    build: {context: ., dockerfile: docker/identity.Dockerfile}
    environment:
      IDENTITY_DB_PATH: /app/services/identity/data/identity.json
      IDENTITY_JWT_PRIVATE_KEY: ${IDENTITY_JWT_PRIVATE_KEY}
      IDENTITY_JWT_PUBLIC_KEY: ${IDENTITY_JWT_PUBLIC_KEY}
      AUTH_COOKIE_SECURE: "false"
      FRONTEND_BASE_URL: http://localhost:3000
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_SENDER: ${EMAIL_SENDER:-no-reply@trackflow.example}
    volumes: [identity-data:/app/services/identity/data]
    ports: ["8002:8000"]

  migrate:
    build: {context: ., dockerfile: docker/central-api.Dockerfile}
    profiles: ["setup"]
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-trackflow}:${POSTGRES_PASSWORD:-trackflow_local_only}@postgres:5432/${POSTGRES_DB:-trackflow_inventory}
      MIGRATION_DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-trackflow}:${POSTGRES_PASSWORD:-trackflow_local_only}@postgres:5432/${POSTGRES_DB:-trackflow_inventory}
      IDENTITY_JWT_PUBLIC_KEY: ${IDENTITY_JWT_PUBLIC_KEY}
    depends_on:
      postgres: {condition: service_healthy}
    command: [".venv/bin/alembic", "upgrade", "head"]

  seed:
    build: {context: ., dockerfile: docker/central-api.Dockerfile}
    profiles: ["setup"]
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-trackflow}:${POSTGRES_PASSWORD:-trackflow_local_only}@postgres:5432/${POSTGRES_DB:-trackflow_inventory}
      IDENTITY_JWT_PUBLIC_KEY: ${IDENTITY_JWT_PUBLIC_KEY}
      SEED_USER_UUID: ${SEED_USER_UUID:-}
    depends_on:
      postgres: {condition: service_healthy}
    command: ["/bin/sh", "-c", ".venv/bin/seed-inventory && .venv/bin/seed-suppliers"]

  central-api:
    build: {context: ., dockerfile: docker/central-api.Dockerfile}
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-trackflow}:${POSTGRES_PASSWORD:-trackflow_local_only}@postgres:5432/${POSTGRES_DB:-trackflow_inventory}
      CENTRAL_API_CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
      IDENTITY_JWT_PUBLIC_KEY: ${IDENTITY_JWT_PUBLIC_KEY}
    depends_on:
      postgres: {condition: service_healthy}
    ports: ["8003:8000"]

  backoffice:
    build: {context: ., dockerfile: docker/backoffice.Dockerfile}
    environment:
      IDENTITY_API_URL: http://identity:8000
      CENTRAL_API_URL: http://central-api:8000
      TALENT_API_URL: ${TALENT_API_URL:-https://playground.4geeks.com/tracker/api/v1}
      AUTH_COOKIE_SECURE: "false"
    depends_on:
      identity: {condition: service_healthy}
      central-api: {condition: service_healthy}
    ports: ["3000:3000"]

  # Live operations feed — synthetic-but-canonical warehouse activity generator.
  # Off unless OPERATIONS_FEED_ENABLED=true; single-writer via a pg advisory lock.
  operations-feed:
    build: {context: ., dockerfile: docker/central-api.Dockerfile}
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-trackflow}:${POSTGRES_PASSWORD:-trackflow_local_only}@postgres:5432/${POSTGRES_DB:-trackflow_inventory}
      OPERATIONS_FEED_ENABLED: ${OPERATIONS_FEED_ENABLED:-false}
      OPERATIONS_FEED_INTERVAL_SECONDS: ${OPERATIONS_FEED_INTERVAL_SECONDS:-5}
      OPERATIONS_FEED_USER_UUID: ${OPERATIONS_FEED_USER_UUID:-${SEED_USER_UUID:-}}
      TELEMETRY_ENABLED: ${TELEMETRY_ENABLED:-true}
      TELEMETRY_OPERATIONAL_RETENTION_DAYS: ${TELEMETRY_OPERATIONAL_RETENTION_DAYS:-7}
      TELEMETRY_SECURITY_RETENTION_DAYS: ${TELEMETRY_SECURITY_RETENTION_DAYS:-7}
    depends_on:
      postgres: {condition: service_healthy}
    command: [".venv/bin/python", "-m", "scripts.operations_feed"]

  # Durable reporting queue consumer, worker heartbeat, and Dallas scheduler.
  reporting-worker:
    build: {context: ., dockerfile: docker/central-api.Dockerfile}
    restart: on-failure
    stop_grace_period: 15m
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-trackflow}:${POSTGRES_PASSWORD:-trackflow_local_only}@postgres:5432/${POSTGRES_DB:-trackflow_inventory}
      HOME: /tmp/trackflow
      PREFECT_HOME: /tmp/trackflow/prefect
      PREFECT_API_URL: http://prefect-server:4200/api
      PREFECT_API_REQUEST_TIMEOUT: ${PREFECT_API_REQUEST_TIMEOUT:-30}
      DATABASE_CONNECT_TIMEOUT_SECONDS: ${DATABASE_CONNECT_TIMEOUT_SECONDS:-10}
      DATABASE_STATEMENT_TIMEOUT_MS: ${DATABASE_STATEMENT_TIMEOUT_MS:-15000}
      REPORTING_HEARTBEAT_SECONDS: ${REPORTING_HEARTBEAT_SECONDS:-60}
      REPORTING_RUN_TIMEOUT_SECONDS: ${REPORTING_RUN_TIMEOUT_SECONDS:-1800}
      REPORTING_STAGE_TIMEOUT_EXTRACT_SECONDS: ${REPORTING_STAGE_TIMEOUT_EXTRACT_SECONDS:-300}
      REPORTING_STAGE_TIMEOUT_TRANSFORM_SECONDS: ${REPORTING_STAGE_TIMEOUT_TRANSFORM_SECONDS:-300}
      REPORTING_STAGE_TIMEOUT_LOAD_SECONDS: ${REPORTING_STAGE_TIMEOUT_LOAD_SECONDS:-300}
      PREFECT_SERVER_ANALYTICS_ENABLED: "false"
      PREFECT_CLOUD_ENABLE_ORCHESTRATION_TELEMETRY: "false"
      PREFECT_TELEMETRY_ENABLE_RESOURCE_METRICS: "false"
      DO_NOT_TRACK: "1"
      REPORTING_R2_BUCKET: ${REPORTING_R2_BUCKET:-}
      REPORTING_R2_ENDPOINT: ${REPORTING_R2_ENDPOINT:-}
      REPORTING_R2_ACCESS_KEY_ID: ${REPORTING_R2_ACCESS_KEY_ID:-}
      REPORTING_R2_SECRET_ACCESS_KEY: ${REPORTING_R2_SECRET_ACCESS_KEY:-}
    depends_on:
      postgres: {condition: service_healthy}
      prefect-server: {condition: service_healthy}
    read_only: true
    tmpfs: ["/tmp"]
    command:
      [
        "/bin/sh",
        "-c",
        "mkdir -p /tmp/trackflow/prefect /tmp/trackflow/.prefect && exec .venv/bin/python -m pipelines.business_performance.worker",
      ]
    deploy:
      replicas: 1
      resources:
        limits: {cpus: "0.50", memory: 768M}

  # Database guardrail and 02:15 America/Chicago retention scheduler.
  maintenance-worker:
    build: {context: ., dockerfile: docker/central-api.Dockerfile}
    restart: on-failure
    stop_grace_period: 5m
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-trackflow}:${POSTGRES_PASSWORD:-trackflow_local_only}@postgres:5432/${POSTGRES_DB:-trackflow_inventory}
      BUSINESS_EVENT_RETENTION_WEEKS: ${BUSINESS_EVENT_RETENTION_WEEKS:-26}
      OPERATIONS_FEED_USER_UUID: ${OPERATIONS_FEED_USER_UUID:-${SEED_USER_UUID:-}}
      OPERATIONS_FEED_BACKFILL_DAYS: ${OPERATIONS_FEED_BACKFILL_DAYS:-10}
      DB_SIZE_SOFT_LIMIT_MB: ${DB_SIZE_SOFT_LIMIT_MB:-400}
      DB_SIZE_HARD_LIMIT_MB: ${DB_SIZE_HARD_LIMIT_MB:-450}
      TELEMETRY_OPERATIONAL_RETENTION_DAYS: ${TELEMETRY_OPERATIONAL_RETENTION_DAYS:-7}
      TELEMETRY_SECURITY_RETENTION_DAYS: ${TELEMETRY_SECURITY_RETENTION_DAYS:-7}
      HOME: /tmp/trackflow
      PREFECT_HOME: /tmp/trackflow/prefect
      PREFECT_API_URL: http://prefect-server:4200/api
      PREFECT_API_REQUEST_TIMEOUT: ${PREFECT_API_REQUEST_TIMEOUT:-30}
      DATABASE_CONNECT_TIMEOUT_SECONDS: ${DATABASE_CONNECT_TIMEOUT_SECONDS:-10}
      DATABASE_STATEMENT_TIMEOUT_MS: ${DATABASE_STATEMENT_TIMEOUT_MS:-15000}
      PREFECT_SERVER_ANALYTICS_ENABLED: "false"
      PREFECT_CLOUD_ENABLE_ORCHESTRATION_TELEMETRY: "false"
      PREFECT_TELEMETRY_ENABLE_RESOURCE_METRICS: "false"
      DO_NOT_TRACK: "1"
    depends_on:
      postgres: {condition: service_healthy}
    read_only: true
    tmpfs: ["/tmp"]
    command:
      [
        "/bin/sh",
        "-c",
        "mkdir -p /tmp/trackflow/prefect /tmp/trackflow/.prefect && exec .venv/bin/python -m scripts.maintenance_worker",
      ]
    deploy:
      replicas: 1
      resources:
        limits: {cpus: "0.25", memory: 384M}

volumes:
  identity-data:
  prefect-db:
