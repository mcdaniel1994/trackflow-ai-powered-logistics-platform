name: trackflow-production
x-runtime: &runtime
  restart: unless-stopped
  security_opt: ["no-new-privileges:true"]
  cap_drop: ["ALL"]
  logging:
    driver: json-file
    options: {max-size: "10m", max-file: "5"}

services:
  prefect-postgres:
    build: {context: ., dockerfile: docker/prefect-postgres.Dockerfile}
    restart: unless-stopped
    security_opt: ["no-new-privileges:true"]
    environment:
      POSTGRES_DB: prefect
      POSTGRES_USER: prefect
      POSTGRES_PASSWORD: ${PREFECT_DB_PASSWORD:?required}
      PREFECT_BACKUP_DB_PASSWORD: ${PREFECT_BACKUP_DB_PASSWORD:?required}
      PREFECT_GUARD_DB_PASSWORD: ${PREFECT_GUARD_DB_PASSWORD:?required}
    volumes:
      - prefect-db:/var/lib/postgresql/data
    read_only: true
    tmpfs: ["/tmp", "/var/run/postgresql"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prefect -d prefect"]
      interval: 5s
      timeout: 5s
      retries: 30
    logging:
      driver: json-file
      options: {max-size: "10m", max-file: "5"}
    deploy:
      resources:
        limits: {cpus: "0.25", memory: 256M}

  # Idempotent deployment bootstrap repairs prerequisites on existing volumes.
  prefect-postgres-bootstrap:
    build: {context: ., dockerfile: docker/prefect-postgres.Dockerfile}
    environment:
      PGHOST: prefect-postgres
      PGPORT: "5432"
      PGPASSWORD: ${PREFECT_DB_PASSWORD:?required}
      POSTGRES_USER: prefect
      POSTGRES_DB: prefect
      PREFECT_BACKUP_DB_PASSWORD: ${PREFECT_BACKUP_DB_PASSWORD:?required}
      PREFECT_GUARD_DB_PASSWORD: ${PREFECT_GUARD_DB_PASSWORD:?required}
    depends_on:
      prefect-postgres: {condition: service_healthy}
    read_only: true
    tmpfs: ["/tmp"]
    security_opt: ["no-new-privileges:true"]
    restart: "no"
    command: ["/usr/local/bin/prefect-postgres-bootstrap"]

  prefect-server:
    <<: *runtime
    image: ${PREFECT_SERVER_IMAGE:?required}
    pull_policy: always
    environment:
      PREFECT_API_DATABASE_CONNECTION_URL: postgresql+asyncpg://prefect:${PREFECT_DB_PASSWORD:?required}@prefect-postgres:5432/prefect
      PREFECT_SERVER_ANALYTICS_ENABLED: "false"
      PREFECT_CLOUD_ENABLE_ORCHESTRATION_TELEMETRY: "false"
      PREFECT_TELEMETRY_ENABLE_RESOURCE_METRICS: "false"
      PREFECT_HOME: /tmp/prefect
      DO_NOT_TRACK: "1"
    depends_on:
      prefect-postgres-bootstrap: {condition: service_completed_successfully}
    read_only: true
    tmpfs: ["/tmp"]
    command: ["prefect", "server", "start", "--host", "0.0.0.0", "--port", "4200"]
    # start_period covers the first-boot Alembic migration, measured at ~10s
    # locally and slower under this service's 0.50 CPU limit. Without it, migration
    # time burns retries as failures.
    # `up -d` blocks here on behalf of reporting-worker, so this healthcheck is on
    # the deploy critical path. Measured success path: ~18s for the whole chain
    # with images already local. The 150s worst case (start_period + interval x
    # retries) is the ceiling before Docker declares this unhealthy — it is NOT a
    # guarantee of fitting Coolify's boundary, because image pull/build runs before
    # any of this and is charged to the same command.
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:4200/api/health', timeout=5).read()"]
      interval: 5s
      timeout: 6s
      retries: 18
      start_period: 60s
    deploy:
      resources:
        limits: {cpus: "0.50", memory: 512M}

  # Deployment-visible release guard. A missing table proves Prefect fell back
  # from PostgreSQL. Nothing depends on this service, so it reports without
  # gating `up -d`; reporting-worker enforces the same conditions fail-closed at
  # its own startup. It retries internally because prefect-server reports healthy
  # as soon as its API binds, which does not prove `flow_run` exists yet.
  prefect-postgres-guard:
    build: {context: ., dockerfile: docker/prefect-postgres.Dockerfile}
    security_opt: ["no-new-privileges:true"]
    environment:
      PGUSER: prefect_guard
      PGPASSWORD: ${PREFECT_GUARD_DB_PASSWORD:?required}
      PREFECT_GUARD_TIMEOUT_SECONDS: ${PREFECT_GUARD_TIMEOUT_SECONDS:-60}
    depends_on:
      prefect-server: {condition: service_healthy}
    read_only: true
    tmpfs: ["/tmp"]
    restart: "no"
    command: ["/usr/local/bin/prefect-postgres-guard"]

  # Static check: compares the pinned server image digest to the installed client
  # version. It never contacts prefect-server, so it must not wait on one.
  prefect-version-guard:
    image: ghcr.io/mcdaniel1994/trackflow-central-api:${TRACKFLOW_IMAGE_TAG:?required}
    pull_policy: always
    security_opt: ["no-new-privileges:true"]
    cap_drop: ["ALL"]
    environment:
      PREFECT_SERVER_IMAGE_REF: ${PREFECT_SERVER_IMAGE:?required}
    read_only: true
    tmpfs: ["/tmp"]
    restart: "no"
    # This image bakes a HEALTHCHECK against :8000, which this command never binds.
    healthcheck: {disable: true}
    command: [".venv/bin/python", "-m", "scripts.prefect_version_guard"]

  prefect-db-backup:
    <<: *runtime
    build: {context: ., dockerfile: docker/prefect-db-backup.Dockerfile}
    environment:
      PGHOST: prefect-postgres
      PGPORT: "5432"
      PGDATABASE: prefect
      PGUSER: prefect_backup
      PGPASSWORD: ${PREFECT_BACKUP_DB_PASSWORD:?required}
      PREFECT_BACKUP_R2_BUCKET: ${PREFECT_BACKUP_R2_BUCKET:-}
      PREFECT_BACKUP_R2_ENDPOINT: ${PREFECT_BACKUP_R2_ENDPOINT:-}
      PREFECT_BACKUP_R2_ACCESS_KEY_ID: ${PREFECT_BACKUP_R2_ACCESS_KEY_ID:-}
      PREFECT_BACKUP_R2_SECRET_ACCESS_KEY: ${PREFECT_BACKUP_R2_SECRET_ACCESS_KEY:-}
      PREFECT_BACKUP_RETENTION_DAYS: ${PREFECT_BACKUP_RETENTION_DAYS:-7}
      PREFECT_DB_DISK_WARNING_MB: ${PREFECT_DB_DISK_WARNING_MB:-1024}
    depends_on:
      prefect-postgres-bootstrap: {condition: service_completed_successfully}
    read_only: true
    tmpfs: ["/tmp"]
    deploy:
      resources:
        limits: {cpus: "0.15", memory: 128M}

  identity:
    <<: *runtime
    image: ghcr.io/mcdaniel1994/trackflow-identity:${TRACKFLOW_IMAGE_TAG:?required}
    pull_policy: always
    expose: ["8000"]
    environment:
      IDENTITY_DB_PATH: /app/services/identity/data/identity.json
      IDENTITY_JWT_PRIVATE_KEY: ${IDENTITY_JWT_PRIVATE_KEY:?required}
      IDENTITY_JWT_PUBLIC_KEY: ${IDENTITY_JWT_PUBLIC_KEY:?required}
      AUTH_COOKIE_SECURE: "true"
      FRONTEND_BASE_URL: https://backoffice.forgehub.cloud
      IDENTITY_CORS_ORIGINS: https://backoffice.forgehub.cloud
      RESEND_API_KEY: ${RESEND_API_KEY:?required}
      EMAIL_SENDER: ${EMAIL_SENDER:?required}
    volumes: [identity-data:/app/services/identity/data]
    read_only: true
    tmpfs: ["/tmp"]
    deploy:
      resources:
        limits: {cpus: "0.50", memory: 768M}

  central-api:
    <<: *runtime
    image: ghcr.io/mcdaniel1994/trackflow-central-api:${TRACKFLOW_IMAGE_TAG:?required}
    pull_policy: always
    expose: ["8000"]
    environment:
      APP_ENV: production
      DATABASE_URL: ${DATABASE_URL:?required}
      CENTRAL_API_CORS_ORIGINS: https://backoffice.forgehub.cloud
      IDENTITY_JWT_PUBLIC_KEY: ${IDENTITY_JWT_PUBLIC_KEY:?required}
      DATABASE_CONNECT_TIMEOUT_SECONDS: "10"
      DATABASE_STATEMENT_TIMEOUT_MS: "15000"
      DATABASE_LOCK_TIMEOUT_MS: "5000"
      # Engagement 6: production telemetry collection enabled with a 7-day window.
      # No fabricated security events; retention is enforced by maintenance-worker.
      TELEMETRY_ENABLED: ${TELEMETRY_ENABLED:-true}
      TELEMETRY_OPERATIONAL_RETENTION_DAYS: ${TELEMETRY_OPERATIONAL_RETENTION_DAYS:-7}
      TELEMETRY_SECURITY_RETENTION_DAYS: ${TELEMETRY_SECURITY_RETENTION_DAYS:-7}
    read_only: true
    tmpfs: ["/tmp"]
    deploy:
      resources:
        limits: {cpus: "0.75", memory: 1G}

  backoffice:
    <<: *runtime
    image: ghcr.io/mcdaniel1994/trackflow-backoffice:${TRACKFLOW_IMAGE_TAG:?required}
    pull_policy: always
    expose: ["3000"]
    environment:
      IDENTITY_API_URL: http://identity:8000
      CENTRAL_API_URL: http://central-api:8000
      TALENT_API_URL: ${TALENT_API_URL:?required}
      AUTH_COOKIE_SECURE: "true"
    depends_on:
      identity: {condition: service_healthy}
      central-api: {condition: service_healthy}
    read_only: true
    tmpfs: ["/tmp"]
    deploy:
      resources:
        limits: {cpus: "1.00", memory: 2G}

  # Live operations feed — long-running, single-writer (pg advisory lock), read-only
  # container. Writes real inventory movements so dashboards are live; kill switch is the
  # operations_feed_control row (no redeploy needed to pause).
  operations-feed:
    <<: *runtime
    image: ghcr.io/mcdaniel1994/trackflow-central-api:${TRACKFLOW_IMAGE_TAG:?required}
    pull_policy: always
    environment:
      APP_ENV: production
      DATABASE_URL: ${DATABASE_URL:?required}
      OPERATIONS_FEED_ENABLED: ${OPERATIONS_FEED_ENABLED:-true}
      OPERATIONS_FEED_INTERVAL_SECONDS: ${OPERATIONS_FEED_INTERVAL_SECONDS:-5}
      OPERATIONS_FEED_USER_UUID: ${OPERATIONS_FEED_USER_UUID:-${SEED_USER_UUID:?required}}
      OPERATIONS_FEED_BACKFILL_DAYS: ${OPERATIONS_FEED_BACKFILL_DAYS:-10}
      TELEMETRY_ENABLED: ${TELEMETRY_ENABLED:-true}
      TELEMETRY_OPERATIONAL_RETENTION_DAYS: ${TELEMETRY_OPERATIONAL_RETENTION_DAYS:-7}
      TELEMETRY_SECURITY_RETENTION_DAYS: ${TELEMETRY_SECURITY_RETENTION_DAYS:-7}
      DATABASE_CONNECT_TIMEOUT_SECONDS: "10"
    read_only: true
    tmpfs: ["/tmp"]
    # This image bakes a HEALTHCHECK against :8000, which this command never binds.
    healthcheck: {disable: true}
    command: [".venv/bin/python", "-m", "scripts.operations_feed"]
    deploy:
      replicas: 1
      resources:
        limits: {cpus: "0.25", memory: 384M}

  # Durable reporting queue consumer, worker heartbeat, and Dallas scheduler.
  reporting-worker:
    <<: *runtime
    image: ghcr.io/mcdaniel1994/trackflow-central-api:${TRACKFLOW_IMAGE_TAG:?required}
    pull_policy: always
    restart: on-failure
    stop_grace_period: 15m
    environment:
      APP_ENV: production
      DATABASE_URL: ${DATABASE_URL:?required}
      DATABASE_CONNECT_TIMEOUT_SECONDS: "10"
      HOME: /tmp/trackflow
      PREFECT_HOME: /tmp/trackflow/prefect
      PREFECT_API_URL: http://prefect-server:4200/api
      PREFECT_API_REQUEST_TIMEOUT: ${PREFECT_API_REQUEST_TIMEOUT:-30}
      # Startup guard only, via a dedicated CONNECT-only role that cannot read
      # Prefect state. Passed as discrete parts, never a URL: a password
      # containing @ : / + or = would corrupt an interpolated DSN.
      PREFECT_GUARD_DB_HOST: prefect-postgres
      PREFECT_GUARD_DB_PORT: "5432"
      PREFECT_GUARD_DB_NAME: prefect
      PREFECT_GUARD_DB_USER: prefect_guard
      PREFECT_GUARD_DB_PASSWORD: ${PREFECT_GUARD_DB_PASSWORD:?required}
      PREFECT_SERVER_IMAGE_REF: ${PREFECT_SERVER_IMAGE:?required}
      PREFECT_GUARD_TIMEOUT_SECONDS: ${PREFECT_GUARD_TIMEOUT_SECONDS:-60}
      DATABASE_STATEMENT_TIMEOUT_MS: "15000"
      REPORTING_HEARTBEAT_SECONDS: "60"
      REPORTING_RUN_TIMEOUT_SECONDS: "1800"
      REPORTING_STAGE_TIMEOUT_EXTRACT_SECONDS: "300"
      REPORTING_STAGE_TIMEOUT_TRANSFORM_SECONDS: "300"
      REPORTING_STAGE_TIMEOUT_LOAD_SECONDS: "300"
      PREFECT_SERVER_ANALYTICS_ENABLED: "false"
      PREFECT_CLOUD_ENABLE_ORCHESTRATION_TELEMETRY: "false"
      PREFECT_TELEMETRY_ENABLE_RESOURCE_METRICS: "false"
      DO_NOT_TRACK: "1"
      REPORTING_R2_BUCKET: ${REPORTING_R2_BUCKET:-}
      REPORTING_R2_ENDPOINT: ${REPORTING_R2_ENDPOINT:-}
      REPORTING_R2_ACCESS_KEY_ID: ${REPORTING_R2_ACCESS_KEY_ID:-}
      REPORTING_R2_SECRET_ACCESS_KEY: ${REPORTING_R2_SECRET_ACCESS_KEY:-}
    # The guards deliberately do not appear here. `up -d` blocks until every
    # `service_completed_successfully` dependency exits, so gating the worker on
    # them charged the whole guard chain to Coolify's command boundary; a slow
    # guard left this container in `created` and the command was killed as exit
    # 255. The worker now enforces the identical conditions fail-closed in its own
    # bounded startup, where a failure restarts one container instead of the deploy.
    depends_on:
      prefect-server: {condition: service_healthy}
    read_only: true
    tmpfs: ["/tmp"]
    # This image bakes a HEALTHCHECK against :8000, which this command never binds.
    healthcheck: {disable: true}
    command:
      [
        "/bin/sh",
        "-c",
        "mkdir -p /tmp/trackflow/prefect /tmp/trackflow/.prefect && exec .venv/bin/python -m pipelines.business_performance.worker",
      ]
    deploy:
      replicas: 1
      resources:
        limits: {cpus: "0.50", memory: 768M}

  # Database guardrail and 02:15 America/Chicago retention scheduler.
  maintenance-worker:
    <<: *runtime
    image: ghcr.io/mcdaniel1994/trackflow-central-api:${TRACKFLOW_IMAGE_TAG:?required}
    pull_policy: always
    restart: on-failure
    stop_grace_period: 5m
    environment:
      APP_ENV: production
      DATABASE_URL: ${DATABASE_URL:?required}
      OPERATIONS_FEED_USER_UUID: ${OPERATIONS_FEED_USER_UUID:-${SEED_USER_UUID:?required}}
      OPERATIONS_FEED_BACKFILL_DAYS: ${OPERATIONS_FEED_BACKFILL_DAYS:-10}
      DB_SIZE_SOFT_LIMIT_MB: ${DB_SIZE_SOFT_LIMIT_MB:-400}
      DB_SIZE_HARD_LIMIT_MB: ${DB_SIZE_HARD_LIMIT_MB:-450}
      TELEMETRY_OPERATIONAL_RETENTION_DAYS: ${TELEMETRY_OPERATIONAL_RETENTION_DAYS:-7}
      TELEMETRY_SECURITY_RETENTION_DAYS: ${TELEMETRY_SECURITY_RETENTION_DAYS:-7}
      BUSINESS_EVENT_RETENTION_WEEKS: ${BUSINESS_EVENT_RETENTION_WEEKS:-26}
      HOME: /tmp/trackflow
      PREFECT_HOME: /tmp/trackflow/prefect
      PREFECT_API_URL: http://prefect-server:4200/api
      PREFECT_API_REQUEST_TIMEOUT: ${PREFECT_API_REQUEST_TIMEOUT:-30}
      PREFECT_RUN_RETENTION_DAYS: ${PREFECT_RUN_RETENTION_DAYS:-30}
      DATABASE_CONNECT_TIMEOUT_SECONDS: "10"
      DATABASE_STATEMENT_TIMEOUT_MS: "15000"
      PREFECT_SERVER_ANALYTICS_ENABLED: "false"
      PREFECT_CLOUD_ENABLE_ORCHESTRATION_TELEMETRY: "false"
      PREFECT_TELEMETRY_ENABLE_RESOURCE_METRICS: "false"
      DO_NOT_TRACK: "1"
    read_only: true
    tmpfs: ["/tmp"]
    # This image bakes a HEALTHCHECK against :8000, which this command never binds.
    healthcheck: {disable: true}
    command:
      [
        "/bin/sh",
        "-c",
        "mkdir -p /tmp/trackflow/prefect /tmp/trackflow/.prefect && exec .venv/bin/python -m scripts.maintenance_worker",
      ]
    deploy:
      replicas: 1
      resources:
        limits: {cpus: "0.25", memory: 384M}

  central-api-migrate:
    image: ghcr.io/mcdaniel1994/trackflow-central-api:${TRACKFLOW_IMAGE_TAG:?required}
    pull_policy: always
    profiles: ["setup"]
    environment:
      APP_ENV: production
      DATABASE_URL: ${DATABASE_URL:?required}
      MIGRATION_DATABASE_URL: ${MIGRATION_DATABASE_URL:?required}
      IDENTITY_JWT_PUBLIC_KEY: ${IDENTITY_JWT_PUBLIC_KEY:?required}
    # This image bakes a HEALTHCHECK against :8000, which this command never binds.
    healthcheck: {disable: true}
    command: [".venv/bin/central-api-migrate"]

  seed-inventory:
    image: ghcr.io/mcdaniel1994/trackflow-central-api:${TRACKFLOW_IMAGE_TAG:?required}
    pull_policy: always
    profiles: ["setup"]
    environment:
      APP_ENV: production
      DATABASE_URL: ${DATABASE_URL:?required}
      IDENTITY_JWT_PUBLIC_KEY: ${IDENTITY_JWT_PUBLIC_KEY:?required}
      SEED_USER_UUID: ${SEED_USER_UUID:?required}
    # This image bakes a HEALTHCHECK against :8000, which this command never binds.
    healthcheck: {disable: true}
    command: [".venv/bin/seed-inventory"]

  seed-suppliers:
    image: ghcr.io/mcdaniel1994/trackflow-central-api:${TRACKFLOW_IMAGE_TAG:?required}
    pull_policy: always
    profiles: ["setup"]
    environment:
      APP_ENV: production
      DATABASE_URL: ${DATABASE_URL:?required}
      IDENTITY_JWT_PUBLIC_KEY: ${IDENTITY_JWT_PUBLIC_KEY:?required}
    # This image bakes a HEALTHCHECK against :8000, which this command never binds.
    healthcheck: {disable: true}
    command: [".venv/bin/seed-suppliers"]

volumes:
  identity-data:
  prefect-db:
