name: trackflow-production
x-runtime: &runtime
  restart: unless-stopped
  security_opt: ["no-new-privileges:true"]
  cap_drop: ["ALL"]
  logging:
    driver: json-file
    options: {max-size: "10m", max-file: "5"}

services:
  identity:
    <<: *runtime
    image: ghcr.io/mcdaniel1994/trackflow-identity:${TRACKFLOW_IMAGE_TAG:?required}
    pull_policy: always
    expose: ["8000"]
    environment:
      IDENTITY_DB_PATH: /app/services/identity/data/identity.json
      IDENTITY_JWT_PRIVATE_KEY: ${IDENTITY_JWT_PRIVATE_KEY:?required}
      IDENTITY_JWT_PUBLIC_KEY: ${IDENTITY_JWT_PUBLIC_KEY:?required}
      AUTH_COOKIE_SECURE: "true"
      FRONTEND_BASE_URL: https://backoffice.forgehub.cloud
      IDENTITY_CORS_ORIGINS: https://backoffice.forgehub.cloud
      RESEND_API_KEY: ${RESEND_API_KEY:?required}
      EMAIL_SENDER: ${EMAIL_SENDER:?required}
    volumes: [identity-data:/app/services/identity/data]
    read_only: true
    tmpfs: ["/tmp"]
    deploy:
      resources:
        limits: {cpus: "0.50", memory: 768M}

  central-api:
    <<: *runtime
    image: ghcr.io/mcdaniel1994/trackflow-central-api:${TRACKFLOW_IMAGE_TAG:?required}
    pull_policy: always
    expose: ["8000"]
    environment:
      DATABASE_URL: ${DATABASE_URL:?required}
      CENTRAL_API_CORS_ORIGINS: https://backoffice.forgehub.cloud
      IDENTITY_JWT_PUBLIC_KEY: ${IDENTITY_JWT_PUBLIC_KEY:?required}
      DATABASE_CONNECT_TIMEOUT_SECONDS: "10"
      DATABASE_STATEMENT_TIMEOUT_MS: "15000"
      DATABASE_LOCK_TIMEOUT_MS: "5000"
      # Engagement 6: production telemetry collection enabled with a 7-day window.
      # No fabricated security events; retention enforced by the telemetry-prune task.
      TELEMETRY_ENABLED: ${TELEMETRY_ENABLED:-true}
      TELEMETRY_OPERATIONAL_RETENTION_DAYS: ${TELEMETRY_OPERATIONAL_RETENTION_DAYS:-7}
      TELEMETRY_SECURITY_RETENTION_DAYS: ${TELEMETRY_SECURITY_RETENTION_DAYS:-7}
    read_only: true
    tmpfs: ["/tmp"]
    deploy:
      resources:
        limits: {cpus: "0.75", memory: 1G}

  backoffice:
    <<: *runtime
    image: ghcr.io/mcdaniel1994/trackflow-backoffice:${TRACKFLOW_IMAGE_TAG:?required}
    pull_policy: always
    expose: ["3000"]
    environment:
      IDENTITY_API_URL: http://identity:8000
      CENTRAL_API_URL: http://central-api:8000
      TALENT_API_URL: ${TALENT_API_URL:?required}
      AUTH_COOKIE_SECURE: "true"
    depends_on:
      identity: {condition: service_healthy}
      central-api: {condition: service_healthy}
    read_only: true
    tmpfs: ["/tmp"]
    deploy:
      resources:
        limits: {cpus: "1.00", memory: 2G}

  # Live operations feed — long-running, single-writer (pg advisory lock), read-only
  # container. Writes real inventory movements so dashboards are live; kill switch is the
  # operations_feed_control row (no redeploy needed to pause).
  operations-feed:
    <<: *runtime
    image: ghcr.io/mcdaniel1994/trackflow-central-api:${TRACKFLOW_IMAGE_TAG:?required}
    pull_policy: always
    environment:
      DATABASE_URL: ${DATABASE_URL:?required}
      OPERATIONS_FEED_ENABLED: ${OPERATIONS_FEED_ENABLED:-true}
      OPERATIONS_FEED_INTERVAL_SECONDS: ${OPERATIONS_FEED_INTERVAL_SECONDS:-5}
      OPERATIONS_FEED_USER_UUID: ${OPERATIONS_FEED_USER_UUID:-${SEED_USER_UUID:?required}}
      OPERATIONS_FEED_BACKFILL_DAYS: ${OPERATIONS_FEED_BACKFILL_DAYS:-10}
      TELEMETRY_ENABLED: ${TELEMETRY_ENABLED:-true}
      TELEMETRY_OPERATIONAL_RETENTION_DAYS: ${TELEMETRY_OPERATIONAL_RETENTION_DAYS:-7}
      TELEMETRY_SECURITY_RETENTION_DAYS: ${TELEMETRY_SECURITY_RETENTION_DAYS:-7}
      DATABASE_CONNECT_TIMEOUT_SECONDS: "10"
    read_only: true
    tmpfs: ["/tmp"]
    command: [".venv/bin/python", "-m", "scripts.operations_feed"]
    deploy:
      replicas: 1
      resources:
        limits: {cpus: "0.25", memory: 384M}

  # Scheduled tasks (Coolify runs these on a cron; profile keeps them out of the default
  # `up`). telemetry-prune: daily. db-size-guard: ~every 15 minutes.
  telemetry-prune:
    image: ghcr.io/mcdaniel1994/trackflow-central-api:${TRACKFLOW_IMAGE_TAG:?required}
    pull_policy: always
    profiles: ["scheduled"]
    environment:
      DATABASE_URL: ${DATABASE_URL:?required}
      TELEMETRY_OPERATIONAL_RETENTION_DAYS: ${TELEMETRY_OPERATIONAL_RETENTION_DAYS:-7}
      TELEMETRY_SECURITY_RETENTION_DAYS: ${TELEMETRY_SECURITY_RETENTION_DAYS:-7}
    command: [".venv/bin/python", "-m", "scripts.prune_telemetry_events"]

  db-size-guard:
    image: ghcr.io/mcdaniel1994/trackflow-central-api:${TRACKFLOW_IMAGE_TAG:?required}
    pull_policy: always
    profiles: ["scheduled"]
    environment:
      DATABASE_URL: ${DATABASE_URL:?required}
      OPERATIONS_FEED_USER_UUID: ${OPERATIONS_FEED_USER_UUID:-${SEED_USER_UUID:?required}}
      OPERATIONS_FEED_BACKFILL_DAYS: ${OPERATIONS_FEED_BACKFILL_DAYS:-10}
      DB_SIZE_SOFT_LIMIT_MB: ${DB_SIZE_SOFT_LIMIT_MB:-400}
      DB_SIZE_HARD_LIMIT_MB: ${DB_SIZE_HARD_LIMIT_MB:-450}
      TELEMETRY_OPERATIONAL_RETENTION_DAYS: ${TELEMETRY_OPERATIONAL_RETENTION_DAYS:-7}
      TELEMETRY_SECURITY_RETENTION_DAYS: ${TELEMETRY_SECURITY_RETENTION_DAYS:-7}
    command: [".venv/bin/python", "-m", "scripts.db_size_guard"]

  central-api-migrate:
    image: ghcr.io/mcdaniel1994/trackflow-central-api:${TRACKFLOW_IMAGE_TAG:?required}
    pull_policy: always
    profiles: ["setup"]
    environment:
      DATABASE_URL: ${DATABASE_URL:?required}
      MIGRATION_DATABASE_URL: ${MIGRATION_DATABASE_URL:?required}
      IDENTITY_JWT_PUBLIC_KEY: ${IDENTITY_JWT_PUBLIC_KEY:?required}
    command: [".venv/bin/alembic", "upgrade", "head"]

  seed-inventory:
    image: ghcr.io/mcdaniel1994/trackflow-central-api:${TRACKFLOW_IMAGE_TAG:?required}
    pull_policy: always
    profiles: ["setup"]
    environment:
      DATABASE_URL: ${DATABASE_URL:?required}
      IDENTITY_JWT_PUBLIC_KEY: ${IDENTITY_JWT_PUBLIC_KEY:?required}
      SEED_USER_UUID: ${SEED_USER_UUID:?required}
    command: [".venv/bin/seed-inventory"]

  seed-suppliers:
    image: ghcr.io/mcdaniel1994/trackflow-central-api:${TRACKFLOW_IMAGE_TAG:?required}
    pull_policy: always
    profiles: ["setup"]
    environment:
      DATABASE_URL: ${DATABASE_URL:?required}
      IDENTITY_JWT_PUBLIC_KEY: ${IDENTITY_JWT_PUBLIC_KEY:?required}
    command: [".venv/bin/seed-suppliers"]

volumes:
  identity-data:
