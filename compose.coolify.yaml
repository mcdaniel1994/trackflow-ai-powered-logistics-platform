name: trackflow-production
x-runtime: &runtime
  restart: unless-stopped
  security_opt: ["no-new-privileges:true"]
  cap_drop: ["ALL"]
  logging:
    driver: json-file
    options: {max-size: "10m", max-file: "5"}

services:
  prefect-postgres:
    image: postgres:16@sha256:17e67d7b9890c99b055ba1e0d5c5be4ec27c9d3a72bda32db24a5e5d8a85af0c
    restart: unless-stopped
    security_opt: ["no-new-privileges:true"]
    environment:
      POSTGRES_DB: prefect
      POSTGRES_USER: prefect
      POSTGRES_PASSWORD: ${PREFECT_DB_PASSWORD:?required}
    volumes:
      - prefect-db:/var/lib/postgresql/data
      - ./docker/prefect-postgres-init.sql:/docker-entrypoint-initdb.d/10-pg-trgm.sql:ro
    read_only: true
    tmpfs: ["/tmp", "/var/run/postgresql"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prefect -d prefect && psql -U prefect -d prefect -tAc \"SELECT 1 FROM pg_extension WHERE extname = 'pg_trgm'\" | grep -qx 1"]
      interval: 5s
      timeout: 5s
      retries: 30
    logging:
      driver: json-file
      options: {max-size: "10m", max-file: "5"}
    deploy:
      resources:
        limits: {cpus: "0.25", memory: 256M}

  prefect-server:
    <<: *runtime
    image: ${PREFECT_SERVER_IMAGE:?required}
    pull_policy: always
    environment:
      PREFECT_API_DATABASE_CONNECTION_URL: postgresql+asyncpg://prefect:${PREFECT_DB_PASSWORD:?required}@prefect-postgres:5432/prefect
      PREFECT_SERVER_ANALYTICS_ENABLED: "false"
      PREFECT_CLOUD_ENABLE_ORCHESTRATION_TELEMETRY: "false"
      PREFECT_TELEMETRY_ENABLE_RESOURCE_METRICS: "false"
      PREFECT_HOME: /tmp/prefect
      DO_NOT_TRACK: "1"
    depends_on:
      prefect-postgres: {condition: service_healthy}
    read_only: true
    tmpfs: ["/tmp"]
    command: ["prefect", "server", "start", "--host", "0.0.0.0", "--port", "4200"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:4200/api/health', timeout=5).read()"]
      interval: 5s
      timeout: 6s
      retries: 60
    deploy:
      resources:
        limits: {cpus: "0.50", memory: 512M}

  # Approval-gated release guard. A missing table proves Prefect fell back from PostgreSQL.
  prefect-postgres-guard:
    image: postgres:16@sha256:17e67d7b9890c99b055ba1e0d5c5be4ec27c9d3a72bda32db24a5e5d8a85af0c
    profiles: ["verification"]
    security_opt: ["no-new-privileges:true"]
    environment:
      PGPASSWORD: ${PREFECT_DB_PASSWORD:?required}
    depends_on:
      prefect-server: {condition: service_healthy}
    read_only: true
    tmpfs: ["/tmp"]
    command:
      [
        "/bin/sh",
        "-ec",
        "test \"$(psql -h prefect-postgres -U prefect -d prefect -tAc \"SELECT count(*) FROM pg_tables WHERE schemaname='public' AND tablename='flow_run'\")\" = 1 && test \"$(psql -h prefect-postgres -U prefect -d prefect -tAc \"SELECT count(*) FROM pg_extension WHERE extname='pg_trgm'\")\" = 1",
      ]

  identity:
    <<: *runtime
    image: ghcr.io/mcdaniel1994/trackflow-identity:${TRACKFLOW_IMAGE_TAG:?required}
    pull_policy: always
    expose: ["8000"]
    environment:
      IDENTITY_DB_PATH: /app/services/identity/data/identity.json
      IDENTITY_JWT_PRIVATE_KEY: ${IDENTITY_JWT_PRIVATE_KEY:?required}
      IDENTITY_JWT_PUBLIC_KEY: ${IDENTITY_JWT_PUBLIC_KEY:?required}
      AUTH_COOKIE_SECURE: "true"
      FRONTEND_BASE_URL: https://backoffice.forgehub.cloud
      IDENTITY_CORS_ORIGINS: https://backoffice.forgehub.cloud
      RESEND_API_KEY: ${RESEND_API_KEY:?required}
      EMAIL_SENDER: ${EMAIL_SENDER:?required}
    volumes: [identity-data:/app/services/identity/data]
    read_only: true
    tmpfs: ["/tmp"]
    deploy:
      resources:
        limits: {cpus: "0.50", memory: 768M}

  central-api:
    <<: *runtime
    image: ghcr.io/mcdaniel1994/trackflow-central-api:${TRACKFLOW_IMAGE_TAG:?required}
    pull_policy: always
    expose: ["8000"]
    environment:
      APP_ENV: production
      DATABASE_URL: ${DATABASE_URL:?required}
      CENTRAL_API_CORS_ORIGINS: https://backoffice.forgehub.cloud
      IDENTITY_JWT_PUBLIC_KEY: ${IDENTITY_JWT_PUBLIC_KEY:?required}
      DATABASE_CONNECT_TIMEOUT_SECONDS: "10"
      DATABASE_STATEMENT_TIMEOUT_MS: "15000"
      DATABASE_LOCK_TIMEOUT_MS: "5000"
      # Engagement 6: production telemetry collection enabled with a 7-day window.
      # No fabricated security events; retention is enforced by maintenance-worker.
      TELEMETRY_ENABLED: ${TELEMETRY_ENABLED:-true}
      TELEMETRY_OPERATIONAL_RETENTION_DAYS: ${TELEMETRY_OPERATIONAL_RETENTION_DAYS:-7}
      TELEMETRY_SECURITY_RETENTION_DAYS: ${TELEMETRY_SECURITY_RETENTION_DAYS:-7}
    read_only: true
    tmpfs: ["/tmp"]
    deploy:
      resources:
        limits: {cpus: "0.75", memory: 1G}

  backoffice:
    <<: *runtime
    image: ghcr.io/mcdaniel1994/trackflow-backoffice:${TRACKFLOW_IMAGE_TAG:?required}
    pull_policy: always
    expose: ["3000"]
    environment:
      IDENTITY_API_URL: http://identity:8000
      CENTRAL_API_URL: http://central-api:8000
      TALENT_API_URL: ${TALENT_API_URL:?required}
      AUTH_COOKIE_SECURE: "true"
    depends_on:
      identity: {condition: service_healthy}
      central-api: {condition: service_healthy}
    read_only: true
    tmpfs: ["/tmp"]
    deploy:
      resources:
        limits: {cpus: "1.00", memory: 2G}

  # Live operations feed — long-running, single-writer (pg advisory lock), read-only
  # container. Writes real inventory movements so dashboards are live; kill switch is the
  # operations_feed_control row (no redeploy needed to pause).
  operations-feed:
    <<: *runtime
    image: ghcr.io/mcdaniel1994/trackflow-central-api:${TRACKFLOW_IMAGE_TAG:?required}
    pull_policy: always
    environment:
      APP_ENV: production
      DATABASE_URL: ${DATABASE_URL:?required}
      OPERATIONS_FEED_ENABLED: ${OPERATIONS_FEED_ENABLED:-true}
      OPERATIONS_FEED_INTERVAL_SECONDS: ${OPERATIONS_FEED_INTERVAL_SECONDS:-5}
      OPERATIONS_FEED_USER_UUID: ${OPERATIONS_FEED_USER_UUID:-${SEED_USER_UUID:?required}}
      OPERATIONS_FEED_BACKFILL_DAYS: ${OPERATIONS_FEED_BACKFILL_DAYS:-10}
      TELEMETRY_ENABLED: ${TELEMETRY_ENABLED:-true}
      TELEMETRY_OPERATIONAL_RETENTION_DAYS: ${TELEMETRY_OPERATIONAL_RETENTION_DAYS:-7}
      TELEMETRY_SECURITY_RETENTION_DAYS: ${TELEMETRY_SECURITY_RETENTION_DAYS:-7}
      DATABASE_CONNECT_TIMEOUT_SECONDS: "10"
    read_only: true
    tmpfs: ["/tmp"]
    command: [".venv/bin/python", "-m", "scripts.operations_feed"]
    deploy:
      replicas: 1
      resources:
        limits: {cpus: "0.25", memory: 384M}

  # Durable reporting queue consumer, worker heartbeat, and Dallas scheduler.
  reporting-worker:
    <<: *runtime
    image: ghcr.io/mcdaniel1994/trackflow-central-api:${TRACKFLOW_IMAGE_TAG:?required}
    pull_policy: always
    restart: on-failure
    stop_grace_period: 15m
    environment:
      APP_ENV: production
      DATABASE_URL: ${DATABASE_URL:?required}
      DATABASE_CONNECT_TIMEOUT_SECONDS: "10"
      HOME: /tmp/trackflow
      PREFECT_HOME: /tmp/trackflow/prefect
      PREFECT_API_URL: http://prefect-server:4200/api
      PREFECT_API_REQUEST_TIMEOUT: ${PREFECT_API_REQUEST_TIMEOUT:-30}
      DATABASE_STATEMENT_TIMEOUT_MS: "15000"
      REPORTING_HEARTBEAT_SECONDS: "60"
      REPORTING_RUN_TIMEOUT_SECONDS: "1800"
      REPORTING_STAGE_TIMEOUT_EXTRACT_SECONDS: "300"
      REPORTING_STAGE_TIMEOUT_TRANSFORM_SECONDS: "300"
      REPORTING_STAGE_TIMEOUT_LOAD_SECONDS: "300"
      PREFECT_SERVER_ANALYTICS_ENABLED: "false"
      PREFECT_CLOUD_ENABLE_ORCHESTRATION_TELEMETRY: "false"
      PREFECT_TELEMETRY_ENABLE_RESOURCE_METRICS: "false"
      DO_NOT_TRACK: "1"
      REPORTING_R2_BUCKET: ${REPORTING_R2_BUCKET:-}
      REPORTING_R2_ENDPOINT: ${REPORTING_R2_ENDPOINT:-}
      REPORTING_R2_ACCESS_KEY_ID: ${REPORTING_R2_ACCESS_KEY_ID:-}
      REPORTING_R2_SECRET_ACCESS_KEY: ${REPORTING_R2_SECRET_ACCESS_KEY:-}
    depends_on:
      prefect-server: {condition: service_healthy}
    read_only: true
    tmpfs: ["/tmp"]
    command:
      [
        "/bin/sh",
        "-c",
        "mkdir -p /tmp/trackflow/prefect /tmp/trackflow/.prefect && exec .venv/bin/python -m pipelines.business_performance.worker",
      ]
    deploy:
      replicas: 1
      resources:
        limits: {cpus: "0.50", memory: 768M}

  # Database guardrail and 02:15 America/Chicago retention scheduler.
  maintenance-worker:
    <<: *runtime
    image: ghcr.io/mcdaniel1994/trackflow-central-api:${TRACKFLOW_IMAGE_TAG:?required}
    pull_policy: always
    restart: on-failure
    stop_grace_period: 5m
    environment:
      APP_ENV: production
      DATABASE_URL: ${DATABASE_URL:?required}
      OPERATIONS_FEED_USER_UUID: ${OPERATIONS_FEED_USER_UUID:-${SEED_USER_UUID:?required}}
      OPERATIONS_FEED_BACKFILL_DAYS: ${OPERATIONS_FEED_BACKFILL_DAYS:-10}
      DB_SIZE_SOFT_LIMIT_MB: ${DB_SIZE_SOFT_LIMIT_MB:-400}
      DB_SIZE_HARD_LIMIT_MB: ${DB_SIZE_HARD_LIMIT_MB:-450}
      TELEMETRY_OPERATIONAL_RETENTION_DAYS: ${TELEMETRY_OPERATIONAL_RETENTION_DAYS:-7}
      TELEMETRY_SECURITY_RETENTION_DAYS: ${TELEMETRY_SECURITY_RETENTION_DAYS:-7}
      BUSINESS_EVENT_RETENTION_WEEKS: ${BUSINESS_EVENT_RETENTION_WEEKS:-26}
      HOME: /tmp/trackflow
      PREFECT_HOME: /tmp/trackflow/prefect
      PREFECT_API_URL: http://prefect-server:4200/api
      PREFECT_API_REQUEST_TIMEOUT: ${PREFECT_API_REQUEST_TIMEOUT:-30}
      DATABASE_CONNECT_TIMEOUT_SECONDS: "10"
      DATABASE_STATEMENT_TIMEOUT_MS: "15000"
      PREFECT_SERVER_ANALYTICS_ENABLED: "false"
      PREFECT_CLOUD_ENABLE_ORCHESTRATION_TELEMETRY: "false"
      PREFECT_TELEMETRY_ENABLE_RESOURCE_METRICS: "false"
      DO_NOT_TRACK: "1"
    read_only: true
    tmpfs: ["/tmp"]
    command:
      [
        "/bin/sh",
        "-c",
        "mkdir -p /tmp/trackflow/prefect /tmp/trackflow/.prefect && exec .venv/bin/python -m scripts.maintenance_worker",
      ]
    deploy:
      replicas: 1
      resources:
        limits: {cpus: "0.25", memory: 384M}

  central-api-migrate:
    image: ghcr.io/mcdaniel1994/trackflow-central-api:${TRACKFLOW_IMAGE_TAG:?required}
    pull_policy: always
    profiles: ["setup"]
    environment:
      APP_ENV: production
      DATABASE_URL: ${DATABASE_URL:?required}
      MIGRATION_DATABASE_URL: ${MIGRATION_DATABASE_URL:?required}
      IDENTITY_JWT_PUBLIC_KEY: ${IDENTITY_JWT_PUBLIC_KEY:?required}
    command: [".venv/bin/central-api-migrate"]

  seed-inventory:
    image: ghcr.io/mcdaniel1994/trackflow-central-api:${TRACKFLOW_IMAGE_TAG:?required}
    pull_policy: always
    profiles: ["setup"]
    environment:
      APP_ENV: production
      DATABASE_URL: ${DATABASE_URL:?required}
      IDENTITY_JWT_PUBLIC_KEY: ${IDENTITY_JWT_PUBLIC_KEY:?required}
      SEED_USER_UUID: ${SEED_USER_UUID:?required}
    command: [".venv/bin/seed-inventory"]

  seed-suppliers:
    image: ghcr.io/mcdaniel1994/trackflow-central-api:${TRACKFLOW_IMAGE_TAG:?required}
    pull_policy: always
    profiles: ["setup"]
    environment:
      APP_ENV: production
      DATABASE_URL: ${DATABASE_URL:?required}
      IDENTITY_JWT_PUBLIC_KEY: ${IDENTITY_JWT_PUBLIC_KEY:?required}
    command: [".venv/bin/seed-suppliers"]

volumes:
  identity-data:
  prefect-db:
